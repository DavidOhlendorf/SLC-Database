{% extends 'main.html' %}
{% load static %}
{% block extra_js %}
  <script src="{% static 'js/ui/countup.js' %}"></script>
{% endblock %}

{% block content %}
<div class="d-flex flex-column align-items-center justify-content-center" style="min-height:70vh;">
  <div class="text-center" style="max-width:600px; width:100%;">

    <img src="{% static 'icons/slcDatabase.png' %}" alt="SLC Datenbank Logo"
         class="mb-4" style="max-height:100px;">

    <form method="get" action="{% url 'search:search' %}">
        <div class="input-group input-group-lg">
            <input type="search" class="form-control rounded-start-pill" name="q"
                placeholder="Suchbegriff eingeben …" aria-label="Suche" autofocus>
            <button class="btn btn-dark rounded-end-pill px-4 ms-1" type="submit">Suchen</button>
        </div>
    </form>

    <p class="text-muted mt-3">Suche zum Beispiel nach Fragen, Variablen, Themen...</p>

    <div class="mt-5">
      <div class="small text-muted mb-2 text-center">
        Aktueller Datenbestand:
      </div>

      <div class="row g-3 justify-content-center">
        <div class="col-6 col-sm-3">
          <div class="border rounded-4 py-3 px-2 bg-body-tertiary text-center shadow-sm">
            <div class="fw-semibold fs-5 stat-number" data-target="{{ wave_count }}">0</div>
            <div class="small text-muted">Befragungen</div>
          </div>
        </div>
        <div class="col-6 col-sm-3">
          <div class="border rounded-4 py-3 px-2 bg-body-tertiary text-center shadow-sm">
            <div class="fw-semibold fs-5 stat-number" data-target="{{ page_count }}">0</div>
            <div class="small text-muted">Fragebogenseiten</div>
          </div>
        </div>
        <div class="col-6 col-sm-3">
          <div class="border rounded-4 py-3 px-2 bg-body-tertiary text-center shadow-sm">
            <div class="fw-semibold fs-5 stat-number" data-target="{{ question_count }}">0</div>
            <div class="small text-muted">Fragen</div>
          </div>
        </div>
        <div class="col-6 col-sm-3">
          <div class="border rounded-4 py-3 px-2 bg-body-tertiary text-center shadow-sm">
            <div class="fw-semibold fs-5 stat-number" data-target="{{ variable_count }}">0</div>
            <div class="small text-muted">Variablen</div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>
{% endblock %}
