{% if wave_documents|length > 1 %}
  <div class="modal fade" id="waveDocumentsModal" tabindex="-1"
       aria-labelledby="waveDocumentsModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="waveDocumentsModalLabel">Dokument auswählen</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Schließen"></button>
        </div>

        <div class="modal-body">
          <div class="list-group">
            {% for doc in wave_documents %}
              <a href="{% url 'waves:wave_document_pdf' doc.pk %}"
                 target="_blank"
                 rel="noopener"
                 class="list-group-item list-group-item-action">
                {{ doc.title }}
              </a>
            {% endfor %}
          </div>
        </div>

        <div class="modal-footer">
          <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Schließen</button>
        </div>
      </div>
    </div>
  </div>
{% endif %}
